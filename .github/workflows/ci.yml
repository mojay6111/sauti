name: Sauti CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:

  # ---------------------------------------------------------------------------
  # Python — ML + API tests
  # ---------------------------------------------------------------------------
  test-python:
    name: Python tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r ml/requirements.txt
          pip install -r api/requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        run: |
          pytest api/tests/ ml/tests/ -v \
            --cov=api/src --cov=ml/src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --tb=short

      - name: Smoke test — train baseline on seed data
        run: |
          cd sauti
          python -m ml.src.training.train --model baseline \
            --data annotation/seed_examples/pilot_dataset.csv

      - name: Smoke test — collector
        run: |
          python -c "
          from ml.src.data.collector import collect_texts
          collect_texts(['Wewe ni mjinga', 'Habari za leo'], source_tag='ci_test')
          print('Collector OK')
          "

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  # ---------------------------------------------------------------------------
  # TypeScript — web type check
  # ---------------------------------------------------------------------------
  test-web:
    name: Web type check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package.json

      - name: Install dependencies
        working-directory: web
        run: npm install

      - name: Type check
        working-directory: web
        run: npm run type-check

      - name: Lint
        working-directory: web
        run: npm run lint

  # ---------------------------------------------------------------------------
  # Docker — build check (no push on PRs)
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: [test-python, test-web]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: |
          docker build -f api/Dockerfile -t sauti-api:ci .

      - name: Build ML image
        run: |
          docker build -f ml/Dockerfile -t sauti-ml:ci .

      - name: Build Web image
        working-directory: web
        run: |
          docker build -f Dockerfile -t sauti-web:ci .

  # ---------------------------------------------------------------------------
  # Deploy to VPS — only on main branch push
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/sauti
            git pull origin main
            docker-compose -f infra/docker-compose.prod.yml pull
            docker-compose -f infra/docker-compose.prod.yml up -d --build
            docker system prune -f
            echo "Deploy complete: $(date)"
